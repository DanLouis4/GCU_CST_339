<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layouts/defaultTemplate">
<head>
    <title>Main Page</title>
</head>
<body>
    <!-- Override container to full-width -->
    <section layout:fragment="content" class="p-0 m-0 w-100">
    <video autoplay muted loop id="bg-video">
        <source th:src="@{/videos/videoBG.mp4}" type="video/mp4">
    </video>
        <div class="split-container">
            <div class="left-section">
                <h1 class="banco" style="font-size: 5em; margin-top: -100px" th:text="${title}">Speed-E-Eats</h1>
				<img th:src="@{/images/logo.png}">
            </div>
            <div class="right-section">
                <a th:href="@{/signin/}" class="btn btn-custom">Sign In</a>
                <a th:href="@{/signup/}" class="btn btn-custom">Sign Up</a>
            </div>
        </div>
    </section>
</body>
</html>
